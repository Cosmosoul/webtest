<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>互联网人格探测仪 | 赛博回声</title>
    <!-- html2canvas 截图 -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e6f3e6;
            background-image: repeating-linear-gradient(0deg, rgba(100,150,100,0.08) 0px, rgba(100,150,100,0.08) 2px, transparent 2px, transparent 8px);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 16px;
        }

        /* 主容器 白绿清新 */
        .container {
            max-width: 660px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 20px 35px -12px rgba(0, 32, 0, 0.2);
            overflow: hidden;
            transition: all 0.2s;
            border: 1px solid #cfe3cf;
        }

        /* 头部 */
        .header {
            background: #f0f9f0;
            padding: 24px 20px 20px;
            text-align: center;
            border-bottom: 2px solid #bcdd9e;
        }
        .header h1 {
            font-size: 1.9rem;
            letter-spacing: -0.5px;
            color: #1f4f1f;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .header h1::before {
            content: "🌿";
            font-size: 1.7rem;
        }
        .header p {
            color: #4a6a3a;
            font-size: 0.8rem;
            margin-top: 8px;
            font-weight: 400;
        }

        /* 扫描线特效 (全局) */
        .scan-line {
            position: relative;
            overflow: hidden;
        }
        .scan-line::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(80, 130, 80, 0.08) 0px, rgba(80, 130, 80, 0.08) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        .quiz-card {
            padding: 24px 22px 32px;
            background: white;
        }

        /* 开始界面 */
        .start-screen, .result-screen {
            text-align: center;
        }
        .start-screen h2 {
            font-size: 1.5rem;
            color: #2b5e2b;
            border-left: 4px solid #88b04b;
            padding-left: 16px;
            text-align: left;
            margin-bottom: 18px;
            font-weight: 600;
        }
        .start-screen p {
            background: #f4faf4;
            padding: 24px;
            border-radius: 28px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #2e452a;
            border: 1px solid #d4e8d4;
            text-align: left;
            margin-bottom: 28px;
        }
        .btn {
            background: #5c8f4c;
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 3px 0 #2f5527;
            font-family: inherit;
        }
        .btn:hover {
            background: #6fa85c;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #2f5527;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2f5527;
        }

        /* 题目区域 */
        .question-area {
            display: none;
        }
        .progress-bar {
            height: 6px;
            background: #e2ecd9;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #5c9e4e;
            transition: width 0.2s;
        }
        .q-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
        }
        .q-counter {
            background: #e2efda;
            padding: 4px 14px;
            border-radius: 60px;
            color: #2f6b2f;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .q-text {
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.4;
            margin: 16px 0 26px;
            color: #1b3b1b;
            background: #fcfef7;
            padding: 20px 18px;
            border-radius: 32px;
            border: 1px solid #cbe3c3;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }
        .option {
            background: #fefef9;
            border: 1px solid #cce3c2;
            border-radius: 48px;
            padding: 12px 18px;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .option:hover {
            background: #eef6e9;
            border-color: #98c278;
        }
        input[type="radio"] {
            accent-color: #5f9e4a;
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .option label {
            flex: 1;
            cursor: pointer;
            font-weight: 500;
            color: #2f4825;
            line-height: 1.4;
            font-size: 0.92rem;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            margin-top: 12px;
        }
        .nav-btn {
            background: #bed6ad;
            box-shadow: 0 2px 0 #8aa97a;
            color: #2a562a;
            font-size: 0.9rem;
            padding: 10px 18px;
            flex: 1;
        }
        .nav-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        /* 结果页面 */
        .result-screen {
            display: none;
        }
        .result-content {
            background: #ffffff;
            border-radius: 32px;
            padding: 12px 16px 20px;
        }
        .ascii-leaf {
            text-align: center;
            font-family: monospace;
            font-size: 0.85rem;
            color: #7ba05b;
            margin-bottom: 12px;
            letter-spacing: 1px;
            white-space: pre;
        }
        .result-sub {
            font-size: 1rem;
            color: #4a6741;
            margin-top: 6px;
            margin-bottom: 8px;
            font-style: italic;
            text-align: center;
        }
        .result-title {
            font-size: 2rem;
            font-weight: 800;
            color: #2d6a2d;
            text-align: center;
            margin: 10px 0 6px;
            background: #eef5ea;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            border: 2px solid #b8d9a4;
        }
        .match-rate {
            background: #ecf5e5;
            color: #3c6e2c;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.9rem;
            display: inline-block;
            margin: 12px auto;
            font-weight: 500;
        }
        .result-desc {
            font-size: 0.96rem;
            line-height: 1.55;
            background: #fefef6;
            padding: 22px 20px;
            border-radius: 28px;
            margin: 16px 0 18px;
            border: 1px solid #dcebd2;
            text-align: left;
            color: #2e4128;
        }
        .screenshot-btn {
            background: #6f9e58;
            box-shadow: 0 2px 0 #426932;
            margin-top: 6px;
            margin-bottom: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            padding: 10px 22px;
        }
        .restart-btn {
            background: #c0d6b2;
            box-shadow: 0 2px 0 #9abb86;
            color: #2d572d;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .disclaimer {
            text-align: center;
            font-size: 0.6rem;
            color: #92a982;
            margin-top: 20px;
            border-top: 1px solid #ddecd5;
            padding-top: 14px;
        }
        footer {
            background: #eef5e9;
            padding: 12px;
            text-align: center;
            font-size: 0.65rem;
            color: #6f8f5e;
            border-top: 1px solid #cfe2c4;
        }

        /* 手机适配 */
        @media (max-width: 550px) {
            .container { max-width: 100%; }
            .q-text { font-size: 1.1rem; }
            .result-title { font-size: 1.5rem; }
            .option label { font-size: 0.8rem; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container scan-line" id="app">
    <div class="header">
        <h1>互联网人格探测仪</h1>
        <p>赛博回声 · 暗号采样协议</p>
    </div>
    <div class="quiz-card">
        <!-- 开始界面（不剧透具体结果） -->
        <div id="startScreen" class="start-screen">
            <h2>🌱 采样开始</h2>
            <p>你每天在信息洪流中留下痕迹——点赞、复读、辩论、沉默。<br>
            本探测仪将根据20道暗号，捕捉你赛博灵魂的独特频率，生成一份<strong>不可预料的人格报告</strong>。<br>
            <br>
            ✨ 共24种神秘互联网人格，绝不提前泄露。<br>
            ✨ 仅供娱乐，请诚实作答，越离谱越真实。<br>
            ✨ 每次测试随机抽题，结果独一无二。</p>
            <button class="btn" id="startBtn">▶ 开始采样</button>
        </div>

        <!-- 题目区 -->
        <div id="questionArea" class="question-area">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="q-meta">
                <span class="q-counter" id="qCounter">第1 / 20题</span>
                <span style="font-size:0.7rem;">⚡ 直觉点击</span>
            </div>
            <div class="q-text" id="questionText"></div>
            <div class="options-list" id="optionsContainer"></div>
            <div class="nav-buttons">
                <button class="btn nav-btn" id="prevBtn">◀ 上一步</button>
                <button class="btn nav-btn" id="nextBtn">下一步 ▶</button>
            </div>
            <div class="disclaimer">人格无高下，抽象即共鸣</div>
        </div>

        <!-- 结果区 -->
        <div id="resultScreen" class="result-screen">
            <div class="result-content" id="resultCaptureArea">
                <div class="ascii-leaf">
                    ╭───────────────────╮<br>
                    │  赛博人格鉴定书   │<br>
                    ╰───────────────────╯
                </div>
                <div class="result-sub">你的网络灵魂本质 ——</div>
                <div style="text-align: center;"><div class="result-title" id="resultTitle"></div></div>
                <div style="text-align: center;"><span class="match-rate" id="matchRate"></span></div>
                <div class="result-desc" id="resultDesc"></div>
            </div>
            <div class="btn-group">
                <button class="btn screenshot-btn" id="screenshotBtn">📸 保存人格图鉴</button>
                <button class="btn restart-btn" id="restartBtn">🔄 重新探测</button>
            </div>
            <div class="disclaimer">⚠️ 仅供娱乐，请保持友善冲浪</div>
        </div>
    </div>
    <footer>白噪音频率 · 抽象人格非官方档案</footer>
</div>

<script>
    // ----------------------------- 24种人格 (只用于内部, 不在开头显示) -----------------------------
    const PERSONAS = [

        "二次元婆罗门": "你看过三部冷门番就自称婆罗门，逢人便说“现在的新番都是垃圾”。你硬盘里的里番更新得比新番还快，但你不承认。你最大的乐趣是在萌新问“有什么好看的”下面回复“你阅片量不够”。",

    // 随机抽20题
    let currentQuestions = [];
    let currentIndex = 0;
    let quizActive = false;
    let autoTimer = null;

    const startScreen = document.getElementById('startScreen');
    const questionArea = document.getElementById('questionArea');
    const resultScreen = document.getElementById('resultScreen');
    const startBtn = document.getElementById('startBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');
    const screenshotBtn = document.getElementById('screenshotBtn');
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const qCounterSpan = document.getElementById('qCounter');
    const progressFill = document.getElementById('progressFill');

    function shufflePick() {
        const shuffled = [...MASTER_QUESTIONS];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, 20).map(q => ({
            text: q.text,
            opts: [...q.opts],
            mapping: [...q.mapping],
            selectedIdx: null
        }));
    }

    function clearTimer() { if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; } }

    function renderQuestion() {
        if (!quizActive) return;
        const q = currentQuestions[currentIndex];
        questionText.innerText = q.text;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            const isChecked = (q.selectedIdx === idx);
            const letter = String.fromCharCode(65+idx);
            optsHtml += `
                <div class="option" data-opt-index="${idx}">
                    <input type="radio" name="qOption" id="opt_${idx}" value="${idx}" ${isChecked ? 'checked' : ''}>
                    <label for="opt_${idx}"><strong>${letter}.</strong> ${opt}</label>
                </div>
            `;
        });
        optionsContainer.innerHTML = optsHtml;
        document.querySelectorAll('.option').forEach(div => {
            const radio = div.querySelector('input');
            const idxVal = parseInt(div.dataset.optIndex);
            const handleChange = () => {
                if (!radio.checked) {
                    radio.checked = true;
                    currentQuestions[currentIndex].selectedIdx = idxVal;
                    clearTimer();
                    autoTimer = setTimeout(() => {
                        if (quizActive) {
                            if (currentIndex < 19) goNextAuto();
                            else computeFinalResult();
                        }
                    }, 180);
                }
            };
            div.addEventListener('click', handleChange);
            if (radio) radio.addEventListener('change', (e) => {
                if (radio.checked) {
                    currentQuestions[currentIndex].selectedIdx = idxVal;
                    clearTimer();
                    autoTimer = setTimeout(() => {
                        if (quizActive) {
                            if (currentIndex < 19) goNextAuto();
                            else computeFinalResult();
                        }
                    }, 180);
                }
            });
        });
        qCounterSpan.innerText = `第${currentIndex+1} / 20题`;
        progressFill.style.width = `${((currentIndex+1)/20)*100}%`;
        prevBtn.disabled = (currentIndex === 0);
        nextBtn.disabled = false;
    }

    function goPrev() { if (!quizActive) return; clearTimer(); if (currentIndex > 0) { currentIndex--; renderQuestion(); } }
    function goNext() {
        if (!quizActive) return;
        if (currentQuestions[currentIndex].selectedIdx === null) { alert("请先选择一个选项"); return; }
        clearTimer();
        if (currentIndex < 19) { currentIndex++; renderQuestion(); }
        else computeFinalResult();
    }
    function goNextAuto() { if (currentIndex < 19) { currentIndex++; renderQuestion(); } else computeFinalResult(); }

    function computeFinalResult() {
        clearTimer();
        const scoreArr = new Array(24).fill(0);
        for (let q of currentQuestions) {
            if (q.selectedIdx !== null) scoreArr[q.mapping[q.selectedIdx]]++;
        }
        let maxScore = -1, bestIdx = 0;
        for (let i=0;i<24;i++) if (scoreArr[i] > maxScore) { maxScore = scoreArr[i]; bestIdx = i; }
        const totalValid = currentQuestions.filter(q=>q.selectedIdx!==null).length;
        const matchPercent = totalValid===0?0:Math.round((maxScore/totalValid)*100);
        const personaKey = PERSONAS[bestIdx];
        document.getElementById('resultTitle').innerText = personaKey;
        document.getElementById('matchRate').innerHTML = `相符程度 ▸ ${matchPercent}% 抽象纯度`;
        document.getElementById('resultDesc').innerHTML = PERSONA_DESC[personaKey];
        startScreen.style.display = 'none';
        questionArea.style.display = 'none';
        resultScreen.style.display = 'block';
        quizActive = false;
    }

    function captureResult() {
        const el = document.getElementById('resultCaptureArea');
        if (!el) return;
        html2canvas(el, { scale: 2, backgroundColor: '#ffffff', logging: false }).then(canvas => {
            const link = document.createElement('a');
            link.download = `人格报告_${new Date().toISOString().slice(0,19)}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }).catch(()=>alert("截图失败，可重试"));
    }

    function startTest() {
        clearTimer();
        currentQuestions = shufflePick();
        currentIndex = 0;
        quizActive = true;
        startScreen.style.display = 'none';
        questionArea.style.display = 'block';
        resultScreen.style.display = 'none';
        renderQuestion();
    }
    function restart() { startTest(); }

    startBtn.addEventListener('click', startTest);
    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    restartBtn.addEventListener('click', restart);
    if (screenshotBtn) screenshotBtn.addEventListener('click', captureResult);
</script>
</body>
</html>
