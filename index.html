<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>互联网里人格探测仪</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #d9f0d9 0%, #b8d9b0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }
        /* 动态粒子背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 40%, rgba(100,180,100,0.15) 2%, transparent 2.5%),
                              radial-gradient(circle at 80% 70%, rgba(80,160,70,0.12) 1.5%, transparent 2%);
            background-size: 55px 55px, 40px 40px;
            pointer-events: none;
            animation: slowMove 20s linear infinite;
            z-index: 0;
        }
        @keyframes slowMove {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 100px 100px, 80px 60px; }
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 245, 0.96);
            backdrop-filter: blur(1px);
            border-radius: 48px;
            box-shadow: 0 25px 40px -12px rgba(30, 60, 20, 0.4);
            overflow: hidden;
            border: 1px solid #cfe3cf;
            position: relative;
            z-index: 2;
            transition: all 0.2s;
        }

        .header {
            background: #f5fce8;
            padding: 24px 20px 20px;
            text-align: center;
            border-bottom: 2px solid #b8da9e;
        }
        .header h1 {
            font-size: 1.9rem;
            letter-spacing: -0.3px;
            color: #2b6e2b;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .header h1::before {
            content: "🌿";
            font-size: 1.8rem;
        }
        .header p {
            color: #5a7a4a;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .quiz-card {
            padding: 24px 22px 32px;
            background: white;
        }

        /* 开始界面 */
        .start-screen, .result-screen {
            text-align: center;
        }
        .start-screen h2 {
            font-size: 1.5rem;
            color: #2f6b2f;
            border-left: 4px solid #8bc34a;
            padding-left: 16px;
            text-align: left;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .start-screen p {
            background: #f6fcf0;
            padding: 24px;
            border-radius: 32px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #2f4a2a;
            border: 1px solid #d4e8ca;
            text-align: left;
            margin-bottom: 28px;
        }
        .btn {
            background: #5e9b4e;
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 3px 0 #2f6a27;
            font-family: inherit;
        }
        .btn:hover {
            background: #77b363;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #2f6a27;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2f6a27;
        }

        /* 题目区域 */
        .question-area {
            display: none;
        }
        .progress-bar {
            height: 6px;
            background: #e3f0db;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #5e9b4e;
            transition: width 0.2s;
        }
        .q-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
        }
        .q-counter {
            background: #e2efda;
            padding: 4px 14px;
            border-radius: 60px;
            color: #2f6b2f;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .q-text {
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.4;
            margin: 16px 0 26px;
            color: #1b3b1b;
            background: #fefef7;
            padding: 20px 18px;
            border-radius: 32px;
            border: 1px solid #cbe3c2;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }
        .option {
            background: #fefef9;
            border: 1px solid #cde0c2;
            border-radius: 48px;
            padding: 12px 18px;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .option:hover {
            background: #edf7e6;
            border-color: #9bc47a;
        }
        input[type="radio"] {
            accent-color: #5f9e4a;
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .option label {
            flex: 1;
            cursor: pointer;
            font-weight: 500;
            color: #2f4825;
            line-height: 1.4;
            font-size: 0.92rem;
        }
        .unsure-option {
            border: 1px dashed #b8cfaa;
            background: #fafef5;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            margin-top: 12px;
        }
        .nav-btn {
            background: #cbe2be;
            box-shadow: 0 2px 0 #96b581;
            color: #2a562a;
            font-size: 0.9rem;
            padding: 10px 18px;
            flex: 1;
        }
        .nav-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        /* 结果页面 */
        .result-screen {
            display: none;
        }
        .result-content {
            background: #ffffff;
            border-radius: 32px;
            padding: 12px 16px 20px;
        }
        .ascii-leaf {
            text-align: center;
            font-family: monospace;
            font-size: 0.85rem;
            color: #7ba05b;
            margin-bottom: 12px;
            white-space: pre;
        }
        .result-sub {
            font-size: 1rem;
            color: #4a6741;
            margin-top: 6px;
            margin-bottom: 8px;
            font-style: italic;
            text-align: center;
        }
        .result-title {
            font-size: 2rem;
            font-weight: 800;
            color: #2d6a2d;
            text-align: center;
            margin: 10px 0 6px;
            background: #eef5ea;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            border: 2px solid #b8d9a4;
        }
        .match-rate {
            background: #ecf5e5;
            color: #3c6e2c;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.9rem;
            display: inline-block;
            margin: 12px auto;
            font-weight: 500;
        }
        .result-desc {
            font-size: 0.96rem;
            line-height: 1.55;
            background: #fefef6;
            padding: 22px 20px;
            border-radius: 28px;
            margin: 16px 0 18px;
            border: 1px solid #dcebd2;
            text-align: left;
            color: #2e4128;
        }
        .share-btn {
            background: #6f9e58;
            box-shadow: 0 2px 0 #426932;
            margin-top: 6px;
            margin-bottom: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            padding: 10px 22px;
        }
        .restart-btn {
            background: #c0d6b2;
            box-shadow: 0 2px 0 #9abb86;
            color: #2d572d;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .disclaimer {
            text-align: center;
            font-size: 0.6rem;
            color: #92a982;
            margin-top: 20px;
            border-top: 1px solid #ddecd5;
            padding-top: 14px;
        }
        footer {
            background: #eef5e9;
            padding: 12px;
            text-align: center;
            font-size: 0.65rem;
            color: #6f8f5e;
            border-top: 1px solid #cfe2c4;
        }

        @media (max-width: 550px) {
            .container { max-width: 100%; }
            .q-text { font-size: 1.1rem; }
            .result-title { font-size: 1.5rem; }
            .option label { font-size: 0.8rem; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>互联网里人格测试</h1>
    </div>
    <div class="quiz-card">
        <div id="startScreen" class="start-screen">
            <h2>🌱 测试开始</h2>
            <p>释放自我！在互联网上没人知道你的真面目。<br>
            本探测仪将根据<strong>20道测试题</strong>（随机抽20道），精准锁定你的互联网灵魂抽象人格。<br>
            <br>
            ✨ 仅供娱乐，越诚实越抽象</p>
            <button class="btn" id="startBtn">▶ 测测你的</button>
        </div>

        <div id="questionArea" class="question-area">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="q-meta">
                <span class="q-counter" id="qCounter">第1 / 20题</span>
                <span style="font-size:0.7rem;">⚡ 直觉点击</span>
            </div>
            <div class="q-text" id="questionText"></div>
            <div class="options-list" id="optionsContainer"></div>
            <div class="nav-buttons">
                <button class="btn nav-btn" id="prevBtn">◀ 上一步</button>
                <button class="btn nav-btn" id="nextBtn">下一步 ▶</button>
            </div>
        </div>

        <div id="resultScreen" class="result-screen">
            <div class="result-content" id="resultCaptureArea">
                <div class="result-sub">你的互联网里人格 ——</div>
                <div style="text-align: center;"><div class="result-title" id="resultTitle"></div></div>
                <div style="text-align: center;"><span class="match-rate" id="matchRate"></span></div>
                <div class="result-desc" id="resultDesc"></div>
            </div>
            <div class="btn-group">
                <button class="btn share-btn" id="shareBtn">📤 分享互联网里人格</button>
                <button class="btn restart-btn" id="restartBtn">🔄 重新测试</button>
            </div>
            <div class="disclaimer">⚠️ 仅供娱乐，友善冲浪。喜欢的话欢迎转发</div>
        </div>
    </div>
    <footer>仅供抽象，欢迎转发</footer>
</div>

<script>
    // ---------- 人格定义 (28种常规 + 路人特殊) ----------
    const PERSONAS = [
        "神人", "嘉豪", "贴吧老哥", "知友", "封矿的王座", "垃圾佬", "钓鱼佬", "牡丹",
        "二次元婆罗门", "键盘侠", "扣帽子专业户", "笔电男大", "胶佬", "私宅", "搬屎大户",
        "跟疯狗", "文艺b", "小南娘", "烂梗复读机", "乐子人", "理中客", "O批", "反二雅士", "区",
        "扫福瑞", "红眼病", "阴暗b", "地雷"    // 新增4个
    ];

    // 对应描述 (含新增)
    const PERSONA_DESC = {
        "神人": "你的每条发言都像从平行宇宙截的图，别人看不懂，你也解释不清。大家把你挂到抽象bot里当标本，你自己还跑去点赞。你说你在第五层，其实你在地下室。但你不在乎，神不需要凡人的理解。",
        "嘉豪": "你最爱玩的游戏是staem和3A大作，蒸汽平台段位已到王者，弹幕看到你就头疼。你发誓这是最后一次吹牛，五分钟后又在另一个直播间“不是哥们”。你把互联网当自己家客厅，其实大家只想把你踢出群。",
        "贴吧老哥": "你熟练使用流汗黄豆和“典急孝”，深夜在戒赌吧发“老哥稳”。现实里你连拼多多砍一刀都不敢找人，但在网上你敢跟人对线三天三夜。你的知识储备来自百度贴吧和营销号，但你觉得自己比教授还懂。",
        "知友": "你开场必“谢邀，人在美国刚下飞机”，结尾“匿了，圈内人太多”。其实你人在鹤岗，刚下电瓶车。你编的故事点赞过万，但你连自己都不信。你最擅长的是在匿名回答下面写小作文。",
        "封矿的王座": "你每天搬运十张国际共运梗图，签名是“全人类解放，先从拉黑右友开始”。你连小区垃圾分类都整不明白，但你对世界革命蓝图门儿清。你最大的成就是在群里把一个人骂退群了，然后宣布“又清除一个反动派”。",
        "垃圾佬": "你蹲守闲鱼捡垃圾，用100块拼出一台能打CS1.6的主机。你发帖“流畅运行3A大作”，楼下问“扫雷也算3A？”你不在乎，捡漏的快乐高于一切。家里堆满电子破烂，但你觉得这是传家宝。",
        "钓鱼佬": "你凌晨四点出发，晚上空手而归，但朋友圈永远是“永不空军”。除了鱼，你什么都钓上来了——塑料袋、破鞋、还有一只迷路的鸭子。你坚信下次一定能爆护，装备越买越贵，鱼越钓越少。",
        "牡丹": "你在网上给别人分析情感问题头头是道，现实中连异性的手都没碰过。你说“我只是不想谈，不是没人要”，偏偏哥们儿就行，别把自己给骗了。你的恋爱经验全部来自贴吧和偶像剧，但你指导起别人来像情感教父。",
        "二次元婆罗门": "你看过三部冷门番就自称婆罗门，逢人便说“现在的新番都是垃圾”。你硬盘里的里番更新得比新番还快，但你不承认。你最大的乐趣是在萌新问“有什么好看的”下面回复“你阅片量不够”。",

        "扣帽子专业户": "你说不过三句话就开始“大恶霸、大军阀、资本主义野心家”。你脑袋上戴的不是帽子，是批发市场。你的逻辑是：只要给对方贴个标签，你就不用动脑子了，方便快捷。",
        "笔电男大": "你背着拯救者去图书馆，打开电脑先调RGB跑马灯。你学习五分钟，贴吧两小时，电池撑不过一节课。你觉得背着游戏本走路带风，其实你的肩膀已经废了，绩点比帧率还低。",

    // 随机抽20题
    let currentQuestions = [];
    let currentIndex = 0;
    let quizActive = false;
    let autoTimer = null;
    let unsureCount = 0;   // 记录当前测试中“我不确定”的次数

    const startScreen = document.getElementById('startScreen');
    const questionArea = document.getElementById('questionArea');
    const resultScreen = document.getElementById('resultScreen');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function shufflePick() {
        const shuffled = [...MASTER_QUESTIONS];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, 20).map(q => ({
            text: q.text,
            opts: [...q.opts],
            mapping: [...q.mapping],
            selectedIdx: null,      // 0-3 普通选项, 4代表“我不确定”
        }));
    }

    function clearTimer() { if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; } }

    function renderQuestion() {
        if (!quizActive) return;
        const q = currentQuestions[currentIndex];
        questionText.innerText = q.text;
        let optsHtml = '';
        const letters = ['A', 'B', 'C', 'D'];
        for (let i = 0; i < 4; i++) {
            const isChecked = (q.selectedIdx === i);
            optsHtml += `
                <div class="option" data-opt-index="${i}">
                    <input type="radio" name="qOption" id="opt_${i}" value="${i}" ${isChecked ? 'checked' : ''}>
                    <label for="opt_${i}"><strong>${letters[i]}.</strong> ${q.opts[i]}</label>
                </div>
            `;
        }
        // 添加“我不确定”选项
        const unsureChecked = (q.selectedIdx === 4);
        optsHtml += `
            <div class="option unsure-option" data-opt-index="4">
                <input type="radio" name="qOption" id="opt_unsure" value="4" ${unsureChecked ? 'checked' : ''}>
                <label for="opt_unsure"><strong>❓</strong> 我不确定 / 跳过</label>
            </div>
        `;
        optionsContainer.innerHTML = optsHtml;

        // 绑定事件 (自动跳转)
        document.querySelectorAll('.option').forEach(div => {
            const radio = div.querySelector('input');
            const idxVal = parseInt(div.dataset.optIndex);
            const handleSelect = () => {
                if (!radio.checked) {
                    radio.checked = true;
                    currentQuestions[currentIndex].selectedIdx = idxVal;
                    clearTimer();
                    autoTimer = setTimeout(() => {
                        if (quizActive) {
                            if (currentIndex < 19) goNextAuto();
                            else computeFinalResult();
                        }
                    }, 200);
                }
            };
            div.addEventListener('click', handleSelect);
            if (radio) radio.addEventListener('change', (e) => {
                if (radio.checked) {
                    currentQuestions[currentIndex].selectedIdx = idxVal;
                    clearTimer();
                    autoTimer = setTimeout(() => {
                        if (quizActive) {
                            if (currentIndex < 19) goNextAuto();
                            else computeFinalResult();
                        }
                    }, 200);
                }
            });
        });

        qCounterSpan.innerText = `第${currentIndex+1} / 20题`;
        progressFill.style.width = `${((currentIndex+1)/20)*100}%`;
        prevBtn.disabled = (currentIndex === 0);
        nextBtn.disabled = false;
    }

    function goPrev() { if (!quizActive) return; clearTimer(); if (currentIndex > 0) { currentIndex--; renderQuestion(); } }
    function goNext() {
        if (!quizActive) return;
        if (currentQuestions[currentIndex].selectedIdx === null) { alert("请先选择一个选项或「我不确定」"); return; }
        clearTimer();
        if (currentIndex < 19) { currentIndex++; renderQuestion(); }
        else computeFinalResult();
    }
    function goNextAuto() { if (currentIndex < 19) { currentIndex++; renderQuestion(); } else computeFinalResult(); }

    function computeFinalResult() {
        clearTimer();
        // 统计不确定次数
        let unsureTotal = 0;
        for (let q of currentQuestions) {
            if (q.selectedIdx === 4) unsureTotal++;
        }
        if (unsureTotal > 10) {
            // 路人结局
            const personaKey = "路人";
            document.getElementById('resultTitle').innerText = personaKey;
            document.getElementById('matchRate').innerHTML = `相符程度 ▸ 无法计算 · 过于游离`;
            document.getElementById('resultDesc').innerHTML = PERSONA_DESC[personaKey];
            startScreen.style.display = 'none';
            questionArea.style.display = 'none';
            resultScreen.style.display = 'block';
            quizActive = false;
            return;
        }
        // 正常计分 (仅统计普通选项 0~3)
        const scoreArr = new Array(28).fill(0);
        for (let q of currentQuestions) {
            if (q.selectedIdx !== null && q.selectedIdx !== 4) {
                const personaIdx = q.mapping[q.selectedIdx];
                if (personaIdx !== undefined) scoreArr[personaIdx]++;
            }
        }
        let maxScore = -1;
        let bestIndices = [];
        for (let i=0; i<28; i++) {
            if (scoreArr[i] > maxScore) {
                maxScore = scoreArr[i];
                bestIndices = [i];
            } else if (scoreArr[i] === maxScore && maxScore !== -1) {
                bestIndices.push(i);
            }
        }
        const totalValid = currentQuestions.filter(q=>q.selectedIdx!==null && q.selectedIdx!==4).length;
        const matchPercent = totalValid===0?0:Math.round((maxScore/totalValid)*100);
        const finalIdx = bestIndices.length ? bestIndices[Math.floor(Math.random() * bestIndices.length)] : 0;
        const personaKey = PERSONAS[finalIdx];
        document.getElementById('resultTitle').innerText = personaKey;
        document.getElementById('matchRate').innerHTML = `相符程度 ▸ ${matchPercent}% 抽象纯度`;
        document.getElementById('resultDesc').innerHTML = PERSONA_DESC[personaKey];
        startScreen.style.display = 'none';
        questionArea.style.display = 'none';
        resultScreen.style.display = 'block';
        quizActive = false;
    }

            alert("✅ 已复制结果到剪贴板，可分享给朋友！");
        } catch(e) { console.warn(e); }
        // 截图保存

            html2canvas(element, { scale: 2, backgroundColor: '#ffffff', logging: false }).then(canvas => {

                link.href = canvas.toDataURL();
                link.click();
            }).catch(()=>alert("截图失败，可手动截图"));
        }

        clearTimer();
        currentQuestions = shufflePick();
        currentIndex = 0;
        quizActive = true;
        startScreen.style.display = 'none';
        questionArea.style.display = 'block';
        resultScreen.style.display = 'none';
        renderQuestion();
    }
    function restart() { startTest(); }

    startBtn.addEventListener('click', startTest);
    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    restartBtn.addEventListener('click', restart);
    if (shareBtn) shareBtn.addEventListener('click', shareResult);
</script>
</body>
</html>
